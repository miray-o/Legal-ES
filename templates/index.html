<!DOCTYPE html>
<html>
<head>
    <title>Old Bailey Legal Agent</title>
    <style>
        body { font-family: 'Garamond', serif; background-color: #f4f1ea; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 500px; background: white; border: 2px solid #3d2b1f; border-radius: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #chat-window { height: 400px; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .agent { background: #e0d7c6; align-self: flex-start; color: #3d2b1f; border-left: 4px solid #3d2b1f; }
        .user { background: #3d2b1f; align-self: flex-end; color: white; }
        #input-area { display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 15px; border: none; outline: none; }
        button { padding: 15px; background: #3d2b1f; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-window" id="display">
            <div class="message agent">Welcome to the Old Bailey. Describe the case in your own words.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="A man stole silk from a house...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value) return;

            // Add user message to UI
            chatWindow.innerHTML += `<div class="message user">${input.value}</div>`;
            const userText = input.value;
            input.value = '';

            // Send to Python Back-end
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: userText })
            });
            const data = await response.json();

            // Add Agent response to UI
            chatWindow.innerHTML += `<div class="message agent">${data.reply}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
